<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Farhan Shop</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <!-- LOGO HEADER -->
    <div class="header">
      <img src="logo.png" class="logo" alt="Logo Farhan Shop">
      <div class="logo-text">Farhan Shop</div>
    </div>

    <div class="container">

      <h1 class="marquee">
        SELAMAT DATANG DI MINIMARKET
      </h1>

      <!-- SEARCH -->
      <input
        type="text"
        id="search"
        placeholder="Cari produk..."
      />

      <!-- PRODUK -->
      <div id="product-list">

        <h2>DAFTAR PRODUK</h2>

        <div
          id="products"
          class="product-container"
        ></div>

      </div>

      <!-- CART -->
      <div id="cart">

        <h2>Keranjang Belanja</h2>

        <ul id="cart-items"></ul>

        <h3>
          Total:
          Rp <span id="total-price">0</span>
        </h3>

        <button id="checkout-btn">
          Checkout
        </button>

      </div>

    </div>

    <script src="script.js"></script>
  </body>
</html>
